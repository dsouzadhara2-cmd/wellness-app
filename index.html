<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wellness App</title>

<style>
body { font-family: Arial; margin: 0; background: #f6f7fb; text-align: center; }
.container { padding: 10px; }

.exercise { font-size: 22px; font-weight: bold; margin: 10px; }
.timer { font-size: 40px; color: #ff6f91; }
.progress { margin: 5px; }

button {
  width: 90%;
  padding: 12px;
  margin: 5px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
}

.start { background: #a0e7e5; }
.pause { background: #ffc75f; }
.next { background: #b5ead7; }
.reset { background: #ffaaa5; }
.demo { background: #d5aaff; }
.end { background: #ff4d6d; color:white; }

</style>
</head>

<body>

<div class="container">

<div class="exercise" id="exercise"></div>
<div class="timer" id="timer"></div>
<div class="progress" id="progress"></div>

<button class="start" onclick="start()">Start</button>
<button class="pause" onclick="pause()">Pause</button>
<button class="next" onclick="next()">Next</button>
<button class="reset" onclick="reset()">Reset</button>
<button class="demo" onclick="showVideo()">Show Demo</button>
<button class="end" onclick="endWorkout()">End Workout</button>

</div>

<script>

let list = [

["March in place",60,"https://www.youtube.com/watch?v=OAJ_J3EZkdY"],
["Neck rotations",60,"https://www.youtube.com/watch?v=GxQ6rXrjH6A"],
["Shoulder rolls",60,"https://www.youtube.com/watch?v=6jHsraw2NIk"],
["Arm swings",60,"https://www.youtube.com/watch?v=140RTNMciH8"],
["Side bends",60,"https://www.youtube.com/watch?v=7gZyR1eH2dE"],

["Step-back squat",40,"https://www.youtube.com/watch?v=aclHkVaku9U"],
["Wall push-ups",40,"https://www.youtube.com/watch?v=IODxDxX7oi4"],
["Standing knee lift",60,"https://www.youtube.com/watch?v=1oed-UmAxFs"],

["Dumbbell Bicep Curl",40,"https://www.youtube.com/watch?v=ykJmrZ5v0Oo"],
["Dumbbell Shoulder Press",40,"https://www.youtube.com/watch?v=B-aVuyhvLHU"],
["Dumbbell Deadlift",40,"https://www.youtube.com/watch?v=ytGaGIn3SjE"],

["Plank",15,"https://www.youtube.com/watch?v=pSHjTRCQxIw"],
["Relax standing",30,"https://www.youtube.com/watch?v=inpok4MKVLM"],

["Vajrasana",120,"https://www.youtube.com/watch?v=Fh6P7kFq3dU"],
["Pawanmuktasana",60,"https://www.youtube.com/watch?v=R8u8b4lQk9g"],
["Spinal twist",60,"https://www.youtube.com/watch?v=UuZJ9h7z8V0"],
["Ankle rotation",30,"https://www.youtube.com/watch?v=6s3d8QxP3Xc"],
["Knee to chest",60,"https://www.youtube.com/watch?v=3Prj9z6kG0Q"],
["Legs Up Wall",90,"https://www.youtube.com/watch?v=1VYlOKUdylM"],

["Deep breathing",60,"https://www.youtube.com/watch?v=inpok4MKVLM"],
["Anulom Vilom",120,"https://www.youtube.com/watch?v=8VwufJrUhic"],
["Kapalbhati",60,"https://www.youtube.com/watch?v=8VwufJrUhic"],
["Bhramari",60,"https://www.youtube.com/watch?v=0BNejY1e9ik"],

["Eye movement",60,"https://www.youtube.com/watch?v=V3h9xw9l9cA"],
["Palming",30,"https://www.youtube.com/watch?v=V3h9xw9l9cA"],
["Face yoga",60,"https://www.youtube.com/watch?v=3p8k5f2aQ7U"],

["Shavasana",180,"https://www.youtube.com/watch?v=1VYlOKUdylM"]

];

let i=0, time=list[0][1], timer, running=false;

function format(t){
let m=Math.floor(t/60), s=t%60;
return (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
}

function load(){
document.getElementById("exercise").innerText=list[i][0];
document.getElementById("timer").innerText=format(list[i][1]);
document.getElementById("progress").innerText=(i+1)+" / "+list.length;
time=list[i][1];
}

function start(){
if(running) return;
running=true;

timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText=format(time);

if(time<=0){
next();
}
},1000);
}

function pause(){ clearInterval(timer); running=false; }

function next(){
clearInterval(timer);
running=false;
i++;

if(i>=list.length){
endWorkout();
return;
}

load();
}

function reset(){
clearInterval(timer);
running=false;
i=0;
load();
}

function endWorkout(){
clearInterval(timer);
document.getElementById("exercise").innerText="Workout Complete 🎉";
document.getElementById("timer").innerText="";
document.getElementById("progress").innerText="";
}

function showVideo(){
window.open(list[i][2], "_blank");
}

load();

</script>

</body>
</html>
